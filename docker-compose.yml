version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_postgres
    restart: always
    environment:
      POSTGRES_USER: adonis_user
      POSTGRES_PASSWORD: alsha3er
      POSTGRES_DB: restaurant_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
